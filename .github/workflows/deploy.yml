name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          DOPPLER_TOKEN: ${{ vars.WINS_DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/deploy.sh
